<svg width="480" height="280" viewBox="0 0 480 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Step 1: Failed task -->
  <rect x="40" y="100" width="100" height="80" rx="5" fill="#FF6D74"/>
  <!-- X mark -->
  <line x1="75" y1="128" x2="95" y2="152" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="95" y1="128" x2="75" y2="152" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow 1: retry -->
  <path d="M160 140 L195 140" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M189 134 L199 140 L189 146" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Retry label -->
  <text x="180" y="126" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">retry</text>

  <!-- Step 2: Retrying task -->
  <rect x="215" y="100" width="100" height="80" rx="5" fill="#FBBF24"/>
  <!-- Circular arrow (retry symbol) -->
  <path d="M265 128 A12 12 0 1 1 253 140" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M253 134 L253 141 L260 141" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow 2: pass -->
  <path d="M335 140 L370 140" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M364 134 L374 140 L364 146" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pass label -->
  <text x="355" y="126" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">pass</text>

  <!-- Step 3: Green / passed -->
  <rect x="390" y="100" width="100" height="80" rx="5" fill="#34D399"/>
  <!-- Checkmark -->
  <path d="M425 140 L437 152 L460 125" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
