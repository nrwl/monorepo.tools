<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="150" stroke="#FF6D74" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="165" stroke="#FF6D74" stroke-width="0.5" opacity="0.1"/>

  <!-- Main orb -->
  <circle cx="200" cy="200" r="130" stroke="#FF6D74" stroke-width="3" fill="none"/>

  <!-- Inner subtle ring -->
  <circle cx="200" cy="200" r="115" stroke="#FF6D74" stroke-width="0.8" opacity="0.3"/>

  <!-- Heartbeat/pulse line across the orb -->
  <polyline
    points="70,200 130,200 150,200 165,200 175,170 185,230 195,160 205,240 215,180 225,200 240,200 260,200 330,200"
    stroke="#FF6D74" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small cross/plus (medical) in top-right of orb -->
  <line x1="280" y1="130" x2="280" y2="155" stroke="#FF6D74" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="267.5" y1="142.5" x2="292.5" y2="142.5" stroke="#FF6D74" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
