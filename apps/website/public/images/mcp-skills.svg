<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Skills grid: 2 columns x 3 rows of labeled blocks -->

  <!-- Row 1 -->
  <rect x="40" y="20" width="190" height="60" rx="6" fill="#FF6D74"/>
  <text x="135" y="56" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">nx-workspace</text>

  <rect x="250" y="20" width="190" height="60" rx="6" fill="#FF6D74"/>
  <text x="345" y="56" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">monitor-ci</text>

  <!-- Row 2 -->
  <rect x="40" y="100" width="190" height="60" rx="6" fill="#9CA3AF"/>
  <text x="135" y="136" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">nx-generate</text>

  <rect x="250" y="100" width="190" height="60" rx="6" fill="#9CA3AF"/>
  <text x="345" y="136" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">nx-run-tasks</text>

  <!-- Row 3 -->
  <rect x="40" y="180" width="190" height="60" rx="6" fill="#9CA3AF"/>
  <text x="135" y="216" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">nx-plugins</text>

  <rect x="250" y="180" width="190" height="60" rx="6" fill="#9CA3AF"/>
  <text x="345" y="216" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="17" font-weight="bold">link-packages</text>

  <!-- "Install" arrow/indicator at the bottom -->
  <path d="M240 270 L240 310" stroke="#FF6D74" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M234 304 L240 314 L246 304" stroke="#FF6D74" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI Agent block at bottom -->
  <rect x="170" y="320" width="140" height="30" rx="5" fill="#FF6D74"/>
  <text x="240" y="341" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">AI Agent</text>
</svg>
